services:
  nova-chevrolet-server:
    image: nova-chevrolet-server:latest
    environment:
      - PORT=${PORT}
      - MAPSIS_URL=${MAPSIS_URL}
      - MAPSIS_USER=${MAPSIS_USER}
      - MAPSIS_PASS=${MAPSIS_PASS}
      - MAPSIS_KEY=${MAPSIS_KEY}
      - WHATSAPP_PRIVATE_KEY=${WHATSAPP_PRIVATE_KEY}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nova-chevrolet.rule=Host(`novachev.dkdevs.com.br`)"
      - "traefik.http.routers.nova-chevrolet.entrypoints=websecure"
      - "traefik.http.routers.nova-chevrolet.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nova-chevrolet-http.rule=Host(`novachev.dkdevs.com.br`)"
      - "traefik.http.routers.nova-chevrolet-http.entrypoints=web"
      - "traefik.http.routers.nova-chevrolet-http.middlewares=https-redirect@docker"
      - "traefik.http.services.nova-chevrolet.loadbalancer.server.port=3001"
    networks:
      - traefik

networks:
  traefik:
    external: true
